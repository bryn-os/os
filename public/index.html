<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />

    <!-- ══ PWA META TAGS ══════════════════════════════════════════════ -->
    <meta name="theme-color" content="#0A7B6C" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Mediconline" />
    <meta name="application-name" content="Mediconline" />
    <meta name="msapplication-TileColor" content="#0D2B3E" />

    <!-- ══ SEO ════════════════════════════════════════════════════════ -->
    <title>Mediconline — Médicaments à Yaoundé</title>
    <meta name="description" content="Comparez les prix des médicaments dans les pharmacies de Yaoundé en temps réel. Trouvez la pharmacie la plus proche avec votre médicament en stock." />
    <meta name="keywords" content="médicaments Yaoundé, pharmacie Cameroun, prix médicaments, stock pharmacie, Coartem, Amoxicilline" />

    <!-- ══ OPEN GRAPH (partage WhatsApp/Facebook) ════════════════════ -->
    <meta property="og:title" content="Mediconline — Médicaments à Yaoundé" />
    <meta property="og:description" content="Trouvez vos médicaments au meilleur prix dans les pharmacies de Yaoundé" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mediconline.vercel.app" />
    <meta property="og:image" content="https://mediconline.vercel.app/icons/icon-512.png" />

    <!-- ══ MANIFEST PWA ══════════════════════════════════════════════ -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ══ ICÔNES APPLE (iPhone) ════════════════════════════════════ -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="%PUBLIC_URL%/icons/icon-144.png" />

    <!-- ══ SPLASH SCREENS APPLE ═════════════════════════════════════ -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- ══ FAVICON ══════════════════════════════════════════════════ -->
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/icons/icon-96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/icons/icon-72.png" />

    <!-- ══ FONTS ════════════════════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Mulish:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <script>
      // Capturer le prompt PWA DÈS le début — avant React
      window.__pwaPrompt = null;
      window.__pwaInstalled = window.matchMedia("(display-mode: standalone)").matches;
      window.addEventListener("beforeinstallprompt", function(e) {
        e.preventDefault();
        window.__pwaPrompt = e;
        // Notifier React si déjà monté
        if (window.__pwaPromptReady) window.__pwaPromptReady(e);
        console.log("✅ PWA prompt capturé !");
      });
      window.addEventListener("appinstalled", function() {
        window.__pwaInstalled = true;
        window.__pwaPrompt = null;
        console.log("✅ Mediconline installée !");
      });
    </script>
    <style>
      /* Splash screen pendant chargement */
      body { margin: 0; background: #0D2B3E; }
      #splash {
        position: fixed; inset: 0;
        background: linear-gradient(135deg, #0D2B3E 0%, #0A7B6C 100%);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.5s;
      }
      #splash h1 {
        font-family: 'Syne', sans-serif;
        font-size: 2.2rem; font-weight: 800;
        color: white; margin: 0;
        letter-spacing: -1px;
      }
      #splash h1 span { color: #0A7B6C; }
      #splash p {
        color: rgba(255,255,255,0.6);
        font-family: 'Mulish', sans-serif;
        font-size: 0.9rem; margin-top: 8px;
      }
      #splash .dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: #0A7B6C; margin: 24px auto 0;
        animation: pulse 1s infinite;
      }
      @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.8)} }
    </style>
  </head>
  <body>
    <!-- Splash screen -->
    <div id="splash">
      <h1>Medic<span>online</span></h1>
      <p>📍 Yaoundé · Chargement...</p>
      <div class="dot"></div>
    </div>

    <noscript>Activez JavaScript pour utiliser Mediconline.</noscript>
    <div id="root"></div>

    <!-- ══ ENREGISTREMENT SERVICE WORKER (PWA) ══════════════════════ -->
    <script>
      // Cacher le splash quand l'app est chargée
      window.addEventListener('load', function() {
        setTimeout(function() {
          const splash = document.getElementById('splash');
          if (splash) {
            splash.style.opacity = '0';
            setTimeout(() => splash.remove(), 500);
          }
        }, 1200);
      });

      // Enregistrer le Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker
            .register('/service-worker.js')
            .then(function(reg) {
              console.log('✅ Mediconline PWA: Service Worker enregistré', reg.scope);

              // Vérifier les mises à jour toutes les heures
              setInterval(() => reg.update(), 3600000);

              // Notifier l'utilisateur si une mise à jour est disponible
              reg.addEventListener('updatefound', function() {
                const newWorker = reg.installing;
                newWorker.addEventListener('statechange', function() {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // Afficher bannière de mise à jour
                    const banner = document.createElement('div');
                    banner.innerHTML = `
                      <div style="
                        position:fixed; bottom:16px; left:16px; right:16px;
                        background:#0A7B6C; color:white; padding:14px 18px;
                        border-radius:12px; display:flex; align-items:center;
                        justify-content:space-between; z-index:9999;
                        font-family:'Mulish',sans-serif; font-size:0.85rem;
                        box-shadow:0 4px 20px rgba(0,0,0,0.3);
                      ">
                        <span>🚀 Nouvelle version disponible !</span>
                        <button onclick="window.location.reload()" style="
                          background:white; color:#0A7B6C; border:none;
                          padding:6px 14px; border-radius:99px; font-weight:700;
                          cursor:pointer; font-size:0.8rem;
                        ">Mettre à jour</button>
                      </div>
                    `;
                    document.body.appendChild(banner);
                  }
                });
              });
            })
            .catch(function(err) {
              console.log('Service Worker non disponible:', err);
            });
        });
      }

      // ── BOUTON D'INSTALLATION PWA ──────────────────────────────────
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;

        // Afficher bouton d'installation personnalisé après 30 secondes
        setTimeout(() => {
          if (!deferredPrompt) return;
          const btn = document.createElement('div');
          btn.id = 'install-banner';
          btn.innerHTML = `
            <div style="
              position:fixed; bottom:16px; left:16px; right:16px;
              background:#0D2B3E; color:white; padding:16px 18px;
              border-radius:12px; display:flex; align-items:center;
              gap:12px; z-index:9999;
              font-family:'Mulish',sans-serif;
              box-shadow:0 4px 20px rgba(0,0,0,0.4);
              border:1px solid rgba(10,123,108,0.4);
            ">
              <span style="font-size:2rem">📱</span>
              <div style="flex:1">
                <div style="font-weight:700;font-size:0.9rem">Installer Mediconline</div>
                <div style="font-size:0.75rem;opacity:0.7;margin-top:2px">Sur votre écran d'accueil — gratuit</div>
              </div>
              <div style="display:flex;gap:8px">
                <button id="install-btn" style="
                  background:#0A7B6C; color:white; border:none;
                  padding:8px 16px; border-radius:99px; font-weight:700;
                  cursor:pointer; font-size:0.8rem; white-space:nowrap;
                ">Installer</button>
                <button id="dismiss-btn" style="
                  background:transparent; color:rgba(255,255,255,0.5);
                  border:1px solid rgba(255,255,255,0.2);
                  padding:8px 12px; border-radius:99px;
                  cursor:pointer; font-size:0.8rem;
                ">✕</button>
              </div>
            </div>
          `;
          document.body.appendChild(btn);

          document.getElementById('install-btn').addEventListener('click', async () => {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
              console.log('✅ Mediconline installé !');
            }
            deferredPrompt = null;
            btn.remove();
          });

          document.getElementById('dismiss-btn').addEventListener('click', () => {
            btn.remove();
            deferredPrompt = null;
          });
        }, 30000);
      });

      window.addEventListener('appinstalled', () => {
        console.log('✅ Mediconline PWA installée avec succès !');
        deferredPrompt = null;
      });
    </script>
  </body>
</html>
